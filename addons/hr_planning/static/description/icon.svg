<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="planningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#875A7B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B3F59;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="5" y="5" width="90" height="90" rx="15" ry="15" fill="url(#planningGradient)"/>
  
  <!-- Calendar Grid -->
  <rect x="15" y="25" width="70" height="60" rx="5" ry="5" fill="white" opacity="0.95"/>
  
  <!-- Header -->
  <rect x="15" y="25" width="70" height="12" rx="5" ry="5" fill="#5B3F59"/>
  <rect x="15" y="32" width="70" height="5" fill="#5B3F59"/>
  
  <!-- Grid Lines -->
  <line x1="38" y1="37" x2="38" y2="85" stroke="#dee2e6" stroke-width="1"/>
  <line x1="61" y1="37" x2="61" y2="85" stroke="#dee2e6" stroke-width="1"/>
  
  <line x1="15" y1="53" x2="85" y2="53" stroke="#dee2e6" stroke-width="1"/>
  <line x1="15" y1="69" x2="85" y2="69" stroke="#dee2e6" stroke-width="1"/>
  
  <!-- Planning Bars -->
  <rect x="18" y="40" width="28" height="8" rx="2" fill="#28a745"/>
  <rect x="42" y="40" width="18" height="8" rx="2" fill="#17a2b8"/>
  
  <rect x="25" y="56" width="22" height="8" rx="2" fill="#ffc107"/>
  <rect x="64" y="56" width="18" height="8" rx="2" fill="#28a745"/>
  
  <rect x="18" y="72" width="15" height="8" rx="2" fill="#17a2b8"/>
  <rect x="42" y="72" width="28" height="8" rx="2" fill="#875A7B"/>
  
  <!-- Clock Icon -->
  <circle cx="78" cy="18" r="10" fill="white"/>
  <circle cx="78" cy="18" r="8" fill="none" stroke="#5B3F59" stroke-width="2"/>
  <line x1="78" y1="18" x2="78" y2="13" stroke="#5B3F59" stroke-width="2" stroke-linecap="round"/>
  <line x1="78" y1="18" x2="83" y2="18" stroke="#5B3F59" stroke-width="2" stroke-linecap="round"/>
</svg>
