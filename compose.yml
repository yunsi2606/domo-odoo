services:
  db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  odoo18:
    image: odoo:18.0
    depends_on:
      - db
    ports:
      - "8068:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    command: >
      odoo -d odoo-demo -i base --load-language=en_US --db_host=db --db_user=odoo --db_password=odoo

  odoo17:
    image: odoo:17.0
    depends_on:
      - db
    ports:
      - "8067:8069"
    volumes:
      - odoo-web-data2:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons2:/mnt/extra-addons
    command: odoo --db_user=odoo --db_password=odoo --db_host=db

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: odoo-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - odoo18
    environment:
      - TUNNEL_METRICS=0.0.0.0:3000
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:3000/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./cloudflared:/etc/cloudflared

volumes:
  odoo-web-data:
  odoo-db-data:
  odoo-web-data2:
